name: Monitor Satellite Imagery

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  check-imagery:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests Pillow imagehash
      
      # README generation lives in check_imagery.py now, so the README always
      # reflects the two most recent captures with their dates. On a manual run
      # (workflow_dispatch) FORCE_CAPTURE saves a fresh capture even if the
      # imagery is unchanged, so a manual trigger always produces a visible result.
      - name: Check for imagery updates
        id: check
        env:
          LATITUDE: ${{ secrets.LATITUDE }}
          LONGITUDE: ${{ secrets.LONGITUDE }}
          ZOOM_LEVEL: '18'
          TILES_ACROSS: '3'
          FORCE_CAPTURE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python check_imagery.py

      - name: Commit new imagery
        if: steps.check.outputs.should_commit == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md imagery_*.jpg last_image.txt
          git commit -m "🛰️ New imagery detected - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
      
      - name: Log no changes
        if: steps.check.outputs.should_commit == 'false'
        run: echo "✓ No changes detected - skipping commit"
      
      - name: Send notification if changed
        if: steps.check.outputs.changed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: '🛰️ New Satellite Imagery Available!'
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            New satellite imagery detected!
            Location: 35°09'55.3"N 106°44'46.4"W
            View: ${{ github.server_url }}/${{ github.repository }}

      # GitHub auto-disables scheduled workflows in repos with no commit
      # activity for 60 days. This monitor only commits when imagery changes,
      # so a long "no change" streak would silently get the schedule turned
      # off. This step pushes an empty keepalive commit as the streak nears
      # the limit, resetting GitHub's inactivity timer. Runs even if earlier
      # steps failed, so a bad week can't let the schedule lapse.
      - name: Keep scheduled workflow alive
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          LAST_COMMIT_EPOCH=$(git log -1 --format=%ct)
          AGE_DAYS=$(( ( $(date -u +%s) - LAST_COMMIT_EPOCH ) / 86400 ))
          echo "Days since last commit: ${AGE_DAYS}"
          if [ "${AGE_DAYS}" -ge 45 ]; then
            echo "Approaching GitHub's 60-day inactivity limit — pushing keepalive commit."
            git commit --allow-empty -m "⏰ Keepalive: keep scheduled workflow enabled ($(date -u +'%Y-%m-%d'))"
            git push
          else
            echo "Repository active enough (${AGE_DAYS}d) — no keepalive commit needed."
          fi
